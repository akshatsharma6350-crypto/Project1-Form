<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="card">
    <div class="card-header">
      <div class="avatar">✦</div>
      <h1>Tu Phir Aagya</h1>
      <p>Abb aa hi gya hai to bhar de - fill in the details below.</p>
    </div>

    <hr class="divider">

    <div class="row">
      <div class="field">
        <input type="text" placeholder=" " id="fname">
        <label for="fname">First name</label>
      </div>
      <div class="field">
        <input type="text" placeholder=" " id="lname">
        <label for="lname">Last name</label>
      </div>
    </div>

    <div class="field">
      <input type="email" placeholder=" " id="email">
      <label for="email">Email address</label>
    </div>

    <div class="field">
      <input type="tel" placeholder=" " id="phone">
      <label for="phone">Phone number (optional)</label>
    </div>

    <div class="field select-wrap">
      <select id="subject">
        <option value="" disabled selected></option>
        <option>General inquiry</option>
        <option>Support request</option>
        <option>Partnership</option>
        <option>Feedback</option>
      </select>
      <label for="subject">Subject</label>
    </div>

    <div class="field textarea-field">
      <textarea placeholder=" " id="msg"></textarea>
      <label for="msg">Your message</label>
    </div>

    <div class="check-group">
      <input type="checkbox" id="agree">
      <label for="agree">I agree to the <a href="#">privacy policy</a> and consent to being contacted regarding my inquiry.</label>
    </div>

    <button class="btn" onclick="handleSubmit(this)">Send message &nbsp;→</button>

    <p class="footer-note">Already have an account? <a href="#">Sign in</a></p>
  </div>

</body>
</html>
